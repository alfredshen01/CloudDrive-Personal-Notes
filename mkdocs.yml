site_name: CloudDrive 個人筆記庫
site_url: https://alfredshen01.github.io/CloudDrive-Personal-Notes/
repo_url: https://github.com/alfredshen01/CloudDrive-Personal-Notes
repo_name: CloudDrive-Personal-Notes

theme:
  name: material
  language: zh-TW
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  features:
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search:
      lang: en
      separator: '[\s​　\-、。，．？！；：:=/()（）「」*,;!?"]+|\.(?!\d)|(?=[一-鿿])'
      pipeline:
        - stopWordFilter

nav:
  - 首頁: index.md
  - 00 目標與進度:
      - 目標總覽: 00-目標與進度/目標總覽.md
      - 每週概述: 00-目標與進度/每週概述.md
  - 01 日誌:
      - W1 0505~0511: 01-日誌/W1-0505~0511.md
      - W2 0512~0518: 01-日誌/W2-0512~0518.md
      - W3 0519~0525: 01-日誌/W3-0519~0525.md
      - W4 0526~0601: 01-日誌/W4-0526~0601.md
      - W5 0602~0608: 01-日誌/W5-0602~0608.md
      - W6 0616~0622: 01-日誌/W6-0616~0622.md
      - W7 0623~0629: 01-日誌/W7-0623~0629.md
      - W8 0630~0706: 01-日誌/W8-0630~0706.md
      - W9 0707~0713: 01-日誌/W9-0707~0713.md
      - W10 0714~0720: 01-日誌/W10-0714~0720.md
  - 02 筆記 harness:
      - Harness 架構: 02-筆記-harness/Harness架構.md
      - Harness 評測: 02-筆記-harness/Harness評測.md
  - 03 筆記 前後端:
      - 後端概念: 03-筆記-前後端/後端概念.md
      - 前端概念: 03-筆記-前後端/前端概念.md
  - 04 筆記 部署維運:
      - 部署與環境: 04-筆記-部署維運/部署與環境.md
  - 05 會議記錄:
      - 會議記錄: 05-會議記錄/會議記錄.md
